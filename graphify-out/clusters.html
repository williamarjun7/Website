<style>

  #tooltip{position:absolute;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 14px;font-size:13px;pointer-events:none;opacity:0;max-width:400px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}

  #tooltip .meta{color:#8b949e;font-size:12px}

  .controls button:hover{background:#30363d}
  .controls label{color:#8b949e;display:flex;align-items:center;gap:6px}
  .controls input[type=range]{width:100px}
  #stats{position:absolute;top:16px;right:20px;background:rgba(22,27,34,.8);border-radius:8px;padding:8px 14px;font-size:12px;color:#8b949e;z-index:50;backdrop-filter:blur(8px)}
  .legend{position:absolute;top:16px;left:20px;z-index:50;font-size:12px}
  .legend-item{display:flex;align-items:center;gap:6px;margin:3px 0;color:#8b949e}
  .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .community-tag{margin:2px 0;font-size:11px}
  .community-bar{height:3px;border-radius:2px;margin:1px 0}
</style>
</head>

  .data(nodes)
  .join('circle')
  .attr('r', d => d.type === 'class' || d.type === 'component' ? 8 : d.type === 'function' ? 6 : 4)
  .attr('fill', d => groupColors[d.group] || '#58a6ff')
  .attr('stroke', '#0d1117')
  .attr('stroke-width', 1.5)
  .style('cursor', 'pointer')
  .on('mouseover', (e, d) => {{
    tooltip.style('opacity', 1).html(
      '<div class="name">' + d.label + '</div>' +
      '<div class="meta">' + d.id + '</div>' +
      '<div class="type" style="background:' + groupColors[d.group] + '40;color:' + groupColors[d.group] + '">' + (d.type || 'unknown') + ' · C' + d.group + '</div>'
    );
  }})
  .on('mousemove', (e) => tooltip.style('left', (e.pageX+14)+'px').style('top', (e.pageY-10)+'px'))
  .on('mouseout', () => tooltip.style('opacity', 0))
  .call(d3.drag()
    .on('start', (e, d) => {{ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }})
    .on('drag', (e, d) => {{ d.fx = e.x; d.fy = e.y; }})
    .on('end', (e, d) => {{ if(!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }})
  );

const labels = g.append('g')
  .selectAll('text')
  .data(nodes)
  .join('text')
  .text(d => d.label.length > 20 ? d.label.slice(0, 20) + '...' : d.label)
  .attr('font-size', 10)
  .attr('dx', 12)
  .attr('dy', 4)
  .attr('fill', '#8b949e')
  .style('pointer-events', 'none');

simulation.on('tick', () => {{
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  labels.attr('x', d => d.x).attr('y', d => d.y);
}});

document.getElementById('charge').oninput = function() {{
  simulation.force('charge').strength(+this.value);
  simulation.alpha(0.3).restart();
}};
document.getElementById('zoom').oninput = function() {{
  svg.call(zoomGroup.transform, d3.zoomIdentity.translate(width/2, height/2).scale(+this.value).translate(-width/2, -height/2));
}};
document.getElementById('reset').onclick = () => {{
  svg.transition().duration(750).call(zoomGroup.transform, d3.zoomIdentity);
}};

window.onresize = () => {{
  svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
}};
</script>
</body>
</html>

# ============================================================
# Nginx Configuration — Highlands Motel (Website + POS Admin)
# Target: /var/www/highlands-motel/current
# The SPA handles routing: public/* + admin/* via client-side
# ============================================================

upstream php_fpm {
    # Reserved for future PHP backend (if needed)
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name highlandsmotel.com www.highlandsmotel.com;

    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/highlands-motel/current;
        allow all;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name highlandsmotel.com www.highlandsmotel.com;

    # ── SSL (Let's Encrypt via Certbot) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/highlandsmotel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/highlandsmotel.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/highlandsmotel.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Root directory (symlink swapped on deploy) ──────────
    root /var/www/highlands-motel/current;
    index index.html;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.tiktok.com https://cdn.tiktok.com https://sf16-website-login.neutral.ttwstatic.com https://sf16-scmcdn-va.ibytedtos.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.insforge.site https://*.insforge.app wss://*.insforge.app; frame-src https://www.tiktok.com; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Static assets with content hashes (immutable cache) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon / robots / well-known ────────────────────────
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml|apple-touch-icon.*\.png)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Service worker (no cache) ────────────────────────────
    location ~* (service-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA routing — All non-file routes → index.html ──────
    # Both website paths (/, /rooms, /booking, /cafe, ...)
    # and admin paths (/admin/**) are handled by the SPA router.
    location / {
        try_files $uri $uri/ /index.html;

        # Rate limiting for admin routes (brute-force protection)
        location ^~ /admin/ {
            limit_req zone=admin burst=20 nodelay;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Deny access to hidden files ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny access to Node/Vite artifacts ──────────────────
    location ~* (node_modules|\.env|\.git|vite\.config|tsconfig) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error pages ──────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/highlands-access.log;
    error_log  /var/log/nginx/highlands-error.log warn;
}

# ── Rate limit zone for admin endpoints ─────────────────────
limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
